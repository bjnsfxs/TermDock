name: Build Artifacts

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  portable-artifact:
    name: portable-artifact
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2

      - name: Build portable package
        run: pnpm ci:portable

      - name: Upload portable artifact
        uses: actions/upload-artifact@v4
        with:
          name: ai-cli-manager-win-x64
          path: artifacts/ai-cli-manager-win-x64.zip
          if-no-files-found: error
          retention-days: 14

  desktop-artifact:
    name: desktop-artifact
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2

      - name: Build desktop client
        run: pnpm ci:desktop

      - name: Upload desktop artifact
        uses: actions/upload-artifact@v4
        with:
          name: ai-cli-manager-client-win-x64
          path: |
            client/src-tauri/target/release/ai-cli-manager-client.exe
            client/src-tauri/target/release/*.pdb
          if-no-files-found: error
          retention-days: 14
